<section class="section tool-section hash-tool" id="hash"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">Hash Generator</h2><p class="tool-sub">Type or paste text and pick an algorithm. Hash is computed in your browser via SubtleCrypto — no data leaves your machine.</p></header><div class="tool-grid"><div class="tool-pane"><label class="tool-label" for="ht-input">Input</label><textarea id="ht-input" class="tool-textarea ht-input" placeholder="hello world" spellcheck="false" autoCapitalize="off"></textarea><div class="tool-actions"><label class="tool-label" style="margin-right:6px" for="ht-algo">Algorithm</label><select id="ht-algo" class="ht-algo"><option value="SHA-1">SHA-1</option><option value="SHA-256" selected="">SHA-256</option><option value="SHA-384">SHA-384</option><option value="SHA-512">SHA-512</option></select><button type="button" class="btn btn-primary ht-hash">Hash</button><button type="button" class="btn ht-clear">Clear</button></div></div><div class="tool-pane"><label class="tool-label">Output (hex)</label><textarea class="tool-textarea tool-output ht-output" placeholder="Result appears here…" spellcheck="false" readonly=""></textarea><div class="tool-actions"><button type="button" class="btn ht-copy">Copy</button><span class="ht-status" aria-live="polite"></span></div></div></div><p class="tool-foot ht-error" hidden=""></p></div></section>
