<section class="section tool-section timestamp-tool" id="timestamp"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">Timestamp Converter</h2><p class="tool-sub">Type a Unix timestamp (seconds OR milliseconds — auto-detected) or an ISO 8601 date. The other formats update live.</p></header><div class="tool-grid"><div class="tool-pane"><label class="tool-label" for="ts-unix">Unix timestamp (s or ms)</label><input id="ts-unix" type="text" class="tool-textarea ts-unix" placeholder="1719360000  OR  1719360000000" spellcheck="false" autoCapitalize="off" style="min-height:40px"/><label class="tool-label" for="ts-iso" style="margin-top:12px">ISO 8601</label><input id="ts-iso" type="text" class="tool-textarea ts-iso" placeholder="2026-06-08T10:00:00Z" spellcheck="false" autoCapitalize="off" style="min-height:40px"/><div class="tool-actions"><button type="button" class="btn btn-primary ts-now">Now</button><button type="button" class="btn ts-clear">Clear</button></div></div><div class="tool-pane"><label class="tool-label">UTC</label><input class="tool-textarea tool-output ts-utc" readonly="" style="min-height:40px"/><label class="tool-label" style="margin-top:12px">Local</label><input class="tool-textarea tool-output ts-local" readonly="" style="min-height:40px"/><label class="tool-label" style="margin-top:12px">Relative</label><input class="tool-textarea tool-output ts-relative" readonly="" style="min-height:40px"/></div></div><p class="tool-foot ts-error" hidden=""></p></div></section>
