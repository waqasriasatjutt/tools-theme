<section class="section tool-section color-tool" id="color"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">Color Picker, Converter &amp; Palette</h2><p class="tool-sub">Pick a color, convert between HEX / RGB / HSL, check WCAG contrast, and generate a matching palette for your design.</p></header><div class="ct-grid"><div class="ct-pick"><input type="color" class="ct-input-color" value="#0e7490"/><div class="ct-swatch"></div></div><div class="ct-fields"><div class="ct-row"><label class="tool-label">HEX</label><input type="text" class="ct-hex tool-input" value="#0e7490"/></div><div class="ct-row"><label class="tool-label">RGB</label><input type="text" class="ct-rgb tool-input" value="rgb(14, 116, 144)"/></div><div class="ct-row"><label class="tool-label">HSL</label><input type="text" class="ct-hsl tool-input" value="hsl(192, 82%, 31%)"/></div><div class="ct-row"><label class="tool-label">CMYK</label><input type="text" class="ct-cmyk tool-input" readonly="" value="cmyk(90%, 19%, 0%, 44%)"/></div></div></div><div class="ct-palette-wrap"><h3 class="pt-h4">Generated palette</h3><div class="ct-palette-controls"><select class="ct-scheme tool-input"><option value="mono">Monochromatic</option><option value="complement">Complementary</option><option value="analogous">Analogous</option><option value="triadic">Triadic</option><option value="tetradic">Tetradic</option></select></div><div class="ct-palette"></div></div><div class="ct-contrast-wrap"><h3 class="pt-h4">Contrast checker (WCAG)</h3><div class="ct-contrast"><div class="ct-contrast-fields"><label class="tool-label">Foreground <input type="color" class="ct-fg" value="#ffffff"/></label><label class="tool-label">Background <input type="color" class="ct-bg" value="#0e7490"/></label></div><div class="ct-contrast-preview"><p style="margin:0;font-size:1.25rem">Large text sample</p><p style="margin:6px 0 0;font-size:0.95rem">Body text — the quick brown fox jumps over the lazy dog.</p></div><div class="ct-contrast-result"><div class="ct-contrast-ratio">—</div><div class="ct-contrast-grades"></div></div></div></div></div></section>
