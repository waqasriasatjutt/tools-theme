<section class="section tool-section url-encoder-tool" id="url-encoder"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">URL Encoder / Decoder</h2><p class="tool-sub">Make text safe for use in URLs (percent-encoding), or decode an existing URL-encoded string back to readable form.</p></header><div class="tool-grid"><div class="tool-pane"><label class="tool-label" for="ue-input">Input</label><textarea id="ue-input" class="tool-textarea ue-input" placeholder="hello world &amp; friends  OR  hello%20world%20%26%20friends" spellcheck="false" autoCapitalize="off"></textarea><div class="tool-actions"><button type="button" class="btn btn-primary ue-encode">Encode</button><button type="button" class="btn ue-decode">Decode</button><button type="button" class="btn ue-clear">Clear</button></div></div><div class="tool-pane"><label class="tool-label" for="ue-output">Output</label><textarea id="ue-output" class="tool-textarea tool-output ue-output" placeholder="Result appears here…" spellcheck="false" readonly=""></textarea><div class="tool-actions"><button type="button" class="btn ue-copy">Copy</button><span class="ue-status" aria-live="polite"></span></div></div></div><p class="tool-foot ue-error" hidden=""></p></div></section>
