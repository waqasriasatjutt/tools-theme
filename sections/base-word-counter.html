<section class="section tool-section word-tool" id="word-counter"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">Word &amp; Character Counter</h2><p class="tool-sub">Real-time word, character, sentence, paragraph and reading-time counts. Built for writers, students and SEOs.</p></header><div class="word-grid"><div class="word-pane"><textarea class="word-input tool-textarea" placeholder="Paste or type your text here…" rows="14"></textarea><div class="tool-actions"><button type="button" class="btn word-paste">Paste</button><button type="button" class="btn word-clear">Clear</button></div></div><aside class="word-stats"><div class="word-stat"><div class="word-stat-label">Words</div><div class="word-stat-value word-w">0</div></div><div class="word-stat"><div class="word-stat-label">Characters</div><div class="word-stat-value word-c">0</div></div><div class="word-stat"><div class="word-stat-label">Characters (no spaces)</div><div class="word-stat-value word-cns">0</div></div><div class="word-stat"><div class="word-stat-label">Sentences</div><div class="word-stat-value word-s">0</div></div><div class="word-stat"><div class="word-stat-label">Paragraphs</div><div class="word-stat-value word-p">0</div></div><div class="word-stat"><div class="word-stat-label">Lines</div><div class="word-stat-value word-l">0</div></div><div class="word-stat"><div class="word-stat-label">Reading time</div><div class="word-stat-value word-rt">0 sec</div></div><div class="word-stat"><div class="word-stat-label">Speaking time</div><div class="word-stat-value word-st">0 sec</div></div></aside></div><div class="tool-foot word-info"><h3 class="pt-h4">Top 10 most-used words</h3><ol class="word-top"></ol></div></div></section>
