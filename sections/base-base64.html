<section class="section tool-section base64-tool" id="base64"><div class="container"><header class="tool-head"><h2 class="h2 tool-title">Base64 Encoder / Decoder</h2><p class="tool-sub">Encode any text to Base64, or decode a Base64 string back to readable text. All in your browser.</p></header><div class="tool-grid"><div class="tool-pane"><label class="tool-label" for="b64-input">Input</label><textarea id="b64-input" class="tool-textarea b64-input" placeholder="hello world  OR  aGVsbG8gd29ybGQ=" spellcheck="false" autoCapitalize="off"></textarea><div class="tool-actions"><button type="button" class="btn btn-primary b64-encode">Encode</button><button type="button" class="btn b64-decode">Decode</button><button type="button" class="btn b64-clear">Clear</button></div></div><div class="tool-pane"><label class="tool-label" for="b64-output">Output</label><textarea id="b64-output" class="tool-textarea tool-output b64-output" placeholder="Result appears here…" spellcheck="false" readonly=""></textarea><div class="tool-actions"><button type="button" class="btn b64-copy">Copy</button><span class="b64-status" aria-live="polite"></span></div></div></div><p class="tool-foot b64-error" hidden=""></p></div></section>
